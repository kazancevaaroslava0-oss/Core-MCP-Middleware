name: Lint JSON

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jsonlint
        run: npm install -g jsonlint
      - name: Lint JSON files
        run: |
          for file in $(find . -name "*.json"); do
            jsonlint -q "$file"
          done
